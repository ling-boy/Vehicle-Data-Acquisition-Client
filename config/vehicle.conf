# 车载客户端配置文件
# 格式: key=value 或 [section] key=value

[server]
host=tstit.x3322.net
port=12345
max_retries=3
retry_delay_ms=1000
use_tls=false
ca_cert=certs/ca.crt

[log]
dir=logs
level=INFO
max_file_size=10485760

[buffer]
ring_capacity=1024
max_msg_size=4096

[collection]
serial_device=/dev/ttyUSB0
serial_baud=9600
camera_enabled=true
audio_enabled=true
imu_enabled=true
radar_enabled=false

[camera]
save_interval_ms=100
jpeg_quality=95

[audio]
save_interval_ms=5000
sample_rate=44100
channels=1

[process]
time_window_ms=200
dataset_dir=Dataset
car_id=Car0001
